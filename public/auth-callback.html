<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciando sesión con Google...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f9fafb;
      color: #111827;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      border: 4px solid rgba(0, 105, 107, 0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: #00696b;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      15% { transform: rotate(15deg); }
      100% { transform: rotate(360deg); }
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 1.25rem;
      font-weight: 700;
    }
    p {
      margin: 0;
      color: #6b7280;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Procesando credenciales</h2>
  <p>Conectando de forma segura con Fuerteventura TOP 100 Experiencias...</p>

  <script>
    // Extract access_token or id_token from current URL (hash or query parameters)
    const hash = window.location.hash || window.location.search;
    if (hash) {
      // Clean leading '#' or '?' and parse params
      const cleanedHash = hash.startsWith('#') || hash.startsWith('?') ? hash.substring(1) : hash;
      const params = new URLSearchParams(cleanedHash);
      const idToken = params.get('id_token');
      const accessToken = params.get('access_token');
      const error = params.get('error');

      if (window.opener) {
        if (error) {
          window.opener.postMessage({
            type: 'GOOGLE_AUTH_FAILURE',
            error: error || 'La autenticación de Google ha fallado.'
          }, '*');
        } else if (idToken || accessToken) {
          window.opener.postMessage({
            type: 'GOOGLE_AUTH_SUCCESS',
            idToken: idToken,
            accessToken: accessToken
          }, '*');
        }
        
        // Wait briefly to ensure message is delivered and then close popup window
        setTimeout(() => {
          window.close();
        }, 300);
      } else {
        // Fallback redirection to main page if visited directly
        window.location.href = '/';
      }
    } else {
      // No parameters received, close immediately or redirect
      if (window.opener) {
        setTimeout(() => window.close(), 1000);
      } else {
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
